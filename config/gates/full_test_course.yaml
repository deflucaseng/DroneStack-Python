# Gate course configuration
# Coordinate frame: AirSim NED — x=North, y=East, z=Down (positive = below origin)
# Positions in metres, sourced from simGetObjectPose on the actual gate objects
# (StaticMeshActor_7, _2, _5, _9, _11 ordered west→east by X)
# yaw=0 → gate normal points North (+X), i.e. the drone flies through along the X axis

trajectory:
  # Used only for polynomial time allocation — set to the drone's actual physical limits.
  # Making these arbitrarily large collapses all segment times to near-zero and
  # breaks the polynomial solver. Keep them realistic.
  max_velocity: 3.0        # m/s  — physical capability for time allocation
  max_acceleration: 6.0    # m/s² — physical capability for time allocation

  # Commanded flight speed passed to moveOnPathAsync. Independent of the polynomial —
  # increase this freely up to whatever the drone's physics allow in AirSim.
  flight_speed: 6.0       # m/s

  approach_distance: 2.0  # m before gate centre
  exit_distance: 2.0      # m after gate centre

